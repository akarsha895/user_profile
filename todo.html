<!doctype html>
<html>
  <head>
    <title>To-Do</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="images/favicon.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body class="bg-main">
    <div class="navbar">
      <div class="logo">My Dashboard</div>

      <div class="nav-links">
        <a href="profile.html">Profile</a>
        <a href="todo.html">To-Do</a>
        <button onclick="logout()">
          Logout <i class="fa-solid fa-right-from-bracket"></i>
        </button>
      </div>
    </div>

    <div class="page">
      <div class="todo-container">
        <h2>My Tasks</h2>

        <div class="todo-input">
          <input type="text" id="taskInput" placeholder="Add a new task..." />
          <button onclick="addTask()">
            <i class="fa-solid fa-plus"></i>
          </button>
        </div>

        <input type="text" id="searchInput" placeholder="Search tasks..." />

        <div class="filters">
          <button onclick="setFilter('all')" id="filter-all">All</button>
          <button onclick="setFilter('completed')" id="filter-completed">
            Completed
          </button>
          <button onclick="setFilter('pending')" id="filter-pending">
            Pending
          </button>
        </div>

        <ul id="taskList"></ul>
      </div>
    </div>
    <footer class="footer">
      <p>&copy; 2026 My Dashboard | Built with HTML, CSS & JS</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
